<div class="main-header">
  page-viewer works!
</div>
<div class="page-container">
  @for (page of pageList(); track page.number) {
    <div class="page">
      <img [alt]="'page ' + page.number"
          [src]="'assets/images/' + page.imageUrl"
          [height]="pageHeight()"
          [width]="pageWidth()" />
    </div>
  }
</div>
