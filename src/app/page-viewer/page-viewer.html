<div class="main-header">
  page-viewer works!
  RenderedPages: {{ renderedRange() | json}}
</div>
<div class="main-container">
  <div class="virtual-scroll-container"
       (scroll)="onVirtualScroll($event)">
    <div class="virtual-scroll"
         [style.height.px]="totalHeight()">
    </div>
  </div>

    <div #renderedPagesElement
         class="rendered-pages">
      @for (page of renderedPages(); track page.number) {
        <div class="page">
          <img [alt]="'page ' + page.number"
               [src]="'assets/images/' + page.imageUrl"
               [height]="pageHeight()"
               [width]="pageWidth()" />
        </div>
      } @empty {
        Empty
      }
    </div>

</div>
