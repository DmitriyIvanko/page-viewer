<div class="main-header">
  Page viewer
  <button (click)="onAddAnnotationMode()">Add annotation</button>
  AnnotationList {{ annotationListS().length }}

  <button (click)="onIncreaseZoom()">
    +
  </button>
  <button (click)="onDecreaseZoom()">
    -
  </button>
  Zoom: {{ zoomS() }}
  isLoading {{ isLoadingS() }}
  Rp: {{ renderedPageListS().length }}
</div>
<div class="main-container"
     (click)="onAddAnnotation($event)"
     (contextmenu)="onCancelAddAnnotationMode($event)">
  <div class="virtual-scroll-container"
       (scroll)="onVirtualScroll($event)">
    <div class="virtual-scroll"
         [style.height.px]="totalHeightS()">
    </div>
  </div>

  <div class="annotation-container">
    @for (annotation of renderedAnnotationListS(); track annotation.id) {
      <div class="annotation"
           [style.left.px]="annotation.point.x"
           [style.top.px]="calcY(annotation)">
        <input class="annotation-input"
               [ngModel]="annotation.message"
               (ngModelChange)="onAnnotationMessageChange($event, annotation)" />
        <button (click)="onRemoveAnnotation(annotation.id)">X</button>
      </div>
    }
  </div>

  <div #renderedPagesElement
        class="rendered-pages">
    @for (page of renderedPageListS(); track page.id) {
      <div class="page">
        <img [alt]="'page ' + page.id"
              [src]="'assets/images/' + page.imageUrl"
              [height]="pageHeightS()"
              [width]="pageWidthS()" />
      </div>
    } @empty {
      Empty
    }
  </div>



</div>
